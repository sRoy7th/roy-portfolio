<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Space Grotesk', system-ui, sans-serif" role="img" aria-label="Arquitectura de RAG con gobierno de datos: documento, extracción de campos autorizados, redacción de sensibles, validación human-in-the-loop, store de registros aprobados, RAG sobre registros, respuesta, y auditoría transversal.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7090"/>
    </marker>
    <style>
      .box{fill:#1b1e2a;stroke:#7c6cff;stroke-width:1.4;rx:10;}
      .gate{fill:#15211f;stroke:#2dd4bf;stroke-width:1.6;}
      .end{fill:#1b1e2a;stroke:#9499ad;stroke-width:1.4;}
      .t{fill:#e9ebf3;font-size:13px;font-weight:700;}
      .s{fill:#9aa0b8;font-size:11px;font-weight:500;}
      .lbl{fill:#7c6cff;font-size:11px;font-weight:700;letter-spacing:.14em;}
      .glbl{fill:#2dd4bf;font-size:11px;font-weight:700;letter-spacing:.1em;}
      .flow{stroke:#6b7090;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <!-- título -->
  <text x="28" y="36" class="lbl">GOBIERNO DE DATOS · EXTREMO A EXTREMO</text>

  <!-- Fila 1 (ingesta + extracción) -->
  <g>
    <rect class="box" x="28"  y="58" width="160" height="62" rx="10"/>
    <text x="108" y="84" text-anchor="middle" class="t">Documento</text>
    <text x="108" y="103" text-anchor="middle" class="s">Cotización / PDF</text>

    <rect class="box" x="228" y="58" width="160" height="62" rx="10"/>
    <text x="308" y="84" text-anchor="middle" class="t">Clasificación</text>
    <text x="308" y="103" text-anchor="middle" class="s">tipo de documento</text>

    <rect class="box" x="428" y="58" width="160" height="62" rx="10"/>
    <text x="508" y="80" text-anchor="middle" class="t">Extracción</text>
    <text x="508" y="98" text-anchor="middle" class="s">solo campos</text>
    <text x="508" y="112" text-anchor="middle" class="s">autorizados</text>

    <rect class="gate" x="628" y="58" width="164" height="62" rx="10"/>
    <text x="710" y="80" text-anchor="middle" class="t">Redacción</text>
    <text x="710" y="98" text-anchor="middle" class="s">sensibles antes</text>
    <text x="710" y="112" text-anchor="middle" class="s">del modelo · RFC, montos</text>
  </g>

  <!-- flechas fila 1 -->
  <path class="flow" d="M188 89 H226" marker-end="url(#arr)"/>
  <path class="flow" d="M388 89 H426" marker-end="url(#arr)"/>
  <path class="flow" d="M588 89 H626" marker-end="url(#arr)"/>

  <!-- bajada en snake (derecha) -->
  <path class="flow" d="M710 120 V196" marker-end="url(#arr)"/>

  <!-- Fila 2 (validación → respuesta), derecha a izquierda -->
  <g>
    <rect class="gate" x="628" y="198" width="164" height="62" rx="10"/>
    <text x="710" y="222" text-anchor="middle" class="t">Validación</text>
    <text x="710" y="240" text-anchor="middle" class="s">human-in-the-loop</text>
    <text x="710" y="253" text-anchor="middle" class="s">confianza + revisión</text>

    <rect class="box" x="428" y="198" width="160" height="62" rx="10"/>
    <text x="508" y="222" text-anchor="middle" class="t">Store aprobado</text>
    <text x="508" y="240" text-anchor="middle" class="s">registros validados</text>

    <rect class="box" x="228" y="198" width="160" height="62" rx="10"/>
    <text x="308" y="222" text-anchor="middle" class="t">RAG</text>
    <text x="308" y="240" text-anchor="middle" class="s">solo sobre esos</text>
    <text x="308" y="253" text-anchor="middle" class="s">registros</text>

    <rect class="end" x="28"  y="198" width="160" height="62" rx="10"/>
    <text x="108" y="230" text-anchor="middle" class="t">Respuesta</text>
  </g>

  <!-- flechas fila 2 -->
  <path class="flow" d="M628 229 H590" marker-end="url(#arr)"/>
  <path class="flow" d="M428 229 H390" marker-end="url(#arr)"/>
  <path class="flow" d="M228 229 H190" marker-end="url(#arr)"/>

  <!-- banda de auditoría -->
  <rect x="28" y="340" width="764" height="74" rx="10" fill="#11161b" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="5 5"/>
  <text x="48" y="368" class="glbl">AUDITORÍA · TRAZABILIDAD</text>
  <text x="48" y="392" class="s">Cada extracción, redacción, validación y consulta queda registrada. La IA opera sobre datos aprobados — no es un dump de PDFs.</text>

  <!-- conectores punteados a la banda -->
  <path d="M710 120 V120" />
  <path class="flow" style="stroke-dasharray:3 4;stroke:#2dd4bf" d="M710 260 V338"/>
  <path class="flow" style="stroke-dasharray:3 4;stroke:#2dd4bf" d="M508 260 V338"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="'Space Grotesk', system-ui, sans-serif" role="img" aria-label="RAG architecture with data governance: document, authorized-field extraction, redaction of sensitive data, human-in-the-loop validation, approved-record store, RAG over records, answer, and cross-cutting audit.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6b7090"/>
    </marker>
    <style>
      .box{fill:#1b1e2a;stroke:#7c6cff;stroke-width:1.4;rx:10;}
      .gate{fill:#15211f;stroke:#2dd4bf;stroke-width:1.6;}
      .end{fill:#1b1e2a;stroke:#9499ad;stroke-width:1.4;}
      .t{fill:#e9ebf3;font-size:13px;font-weight:700;}
      .s{fill:#9aa0b8;font-size:11px;font-weight:500;}
      .lbl{fill:#7c6cff;font-size:11px;font-weight:700;letter-spacing:.14em;}
      .glbl{fill:#2dd4bf;font-size:11px;font-weight:700;letter-spacing:.1em;}
      .flow{stroke:#6b7090;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <text x="28" y="36" class="lbl">DATA GOVERNANCE · END TO END</text>

  <!-- Row 1 -->
  <g>
    <rect class="box" x="28"  y="58" width="160" height="62" rx="10"/>
    <text x="108" y="84" text-anchor="middle" class="t">Document</text>
    <text x="108" y="103" text-anchor="middle" class="s">Quote / PDF</text>

    <rect class="box" x="228" y="58" width="160" height="62" rx="10"/>
    <text x="308" y="84" text-anchor="middle" class="t">Classification</text>
    <text x="308" y="103" text-anchor="middle" class="s">document type</text>

    <rect class="box" x="428" y="58" width="160" height="62" rx="10"/>
    <text x="508" y="80" text-anchor="middle" class="t">Extraction</text>
    <text x="508" y="98" text-anchor="middle" class="s">authorized</text>
    <text x="508" y="112" text-anchor="middle" class="s">fields only</text>

    <rect class="gate" x="628" y="58" width="164" height="62" rx="10"/>
    <text x="710" y="80" text-anchor="middle" class="t">Redaction</text>
    <text x="710" y="98" text-anchor="middle" class="s">sensitive data before</text>
    <text x="710" y="112" text-anchor="middle" class="s">the model · tax ID, amounts</text>
  </g>

  <path class="flow" d="M188 89 H226" marker-end="url(#arr)"/>
  <path class="flow" d="M388 89 H426" marker-end="url(#arr)"/>
  <path class="flow" d="M588 89 H626" marker-end="url(#arr)"/>
  <path class="flow" d="M710 120 V196" marker-end="url(#arr)"/>

  <!-- Row 2 -->
  <g>
    <rect class="gate" x="628" y="198" width="164" height="62" rx="10"/>
    <text x="710" y="222" text-anchor="middle" class="t">Validation</text>
    <text x="710" y="240" text-anchor="middle" class="s">human-in-the-loop</text>
    <text x="710" y="253" text-anchor="middle" class="s">confidence + review</text>

    <rect class="box" x="428" y="198" width="160" height="62" rx="10"/>
    <text x="508" y="222" text-anchor="middle" class="t">Approved store</text>
    <text x="508" y="240" text-anchor="middle" class="s">validated records</text>

    <rect class="box" x="228" y="198" width="160" height="62" rx="10"/>
    <text x="308" y="222" text-anchor="middle" class="t">RAG</text>
    <text x="308" y="240" text-anchor="middle" class="s">over those</text>
    <text x="308" y="253" text-anchor="middle" class="s">records only</text>

    <rect class="end" x="28"  y="198" width="160" height="62" rx="10"/>
    <text x="108" y="230" text-anchor="middle" class="t">Answer</text>
  </g>

  <path class="flow" d="M628 229 H590" marker-end="url(#arr)"/>
  <path class="flow" d="M428 229 H390" marker-end="url(#arr)"/>
  <path class="flow" d="M228 229 H190" marker-end="url(#arr)"/>

  <!-- Audit band -->
  <rect x="28" y="340" width="764" height="74" rx="10" fill="#11161b" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="5 5"/>
  <text x="48" y="368" class="glbl">AUDIT · TRACEABILITY</text>
  <text x="48" y="392" class="s">Every extraction, redaction, validation and query is logged. The AI operates over approved data — not a PDF dump.</text>

  <path class="flow" style="stroke-dasharray:3 4;stroke:#2dd4bf" d="M710 260 V338"/>
  <path class="flow" style="stroke-dasharray:3 4;stroke:#2dd4bf" d="M508 260 V338"/>
</svg>
